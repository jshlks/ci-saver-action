name: CI-Saver Code Inspector
description: Enforces a license check and determines whether the heavy CI/CD pipeline should run

inputs:
  license_key:
    description: Your paid $15/month Gumroad license key
    required: true

outputs:
  should_run:
    description: Returns false if the heavy CI/CD pipeline runs can be skipped

runs:
  using: "node20"
  main: "index.js"
